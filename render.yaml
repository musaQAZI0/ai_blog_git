services:
  - type: web
    name: ai-medical-blog
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: |
      apt-get update &&
      apt-get install -y \
        build-essential \
        libcairo2-dev \
        libpango1.0-dev \
        libjpeg-dev \
        libgif-dev \
        librsvg2-dev \
        libpixman-1-dev \
        pkg-config &&
      npm ci &&
      npm run build
    startCommand: npm start
    healthCheckPath: /api/public-config
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
