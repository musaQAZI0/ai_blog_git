services:
  - type: web
    name: ai-medical-blog
    env: node
    region: frankfurt
    plan: free
    buildCommand: >
      apt-get install -y
      libcairo2
      libpango-1.0-0
      libpangocairo-1.0-0
      libjpeg-turbo8
      libgif7
      librsvg2-2
      2>/dev/null || true
      && npm ci
      && npm run build
    startCommand: npm start
    healthCheckPath: /api/public-config
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
